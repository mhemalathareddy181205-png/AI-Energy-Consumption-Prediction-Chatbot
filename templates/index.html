<!DOCTYPE html>
<html>

<head>

    <title>AI Household Energy Budget Advisor</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

    <div class="container">

        <h1>⚡ AI Household Energy Budget Advisor</h1>

        <!-- Chatbot Card -->

        <div class="card chat-card">

            <h2>🤖 AI Energy Assistant</h2>

            <div id="chatbox"></div>

            <div class="chat-input">

                <input
                    type="text"
                    id="message"
                    placeholder="Ask energy-related questions..."
                >

                <button onclick="sendMessage()">
                    Send
                </button>

            </div>

        </div>

    </div>

    <script
        src="{{ url_for('static', filename='script.js') }}"
    ></script>

</body>

</html>
